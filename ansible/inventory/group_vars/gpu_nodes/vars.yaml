# Deployment variables for gpu_nodes
# Secrets (hf_token, litellm_master_key) are in vault.yaml — encrypt before committing:
#   ansible-vault encrypt ansible/inventory/group_vars/gpu_nodes/vault.yaml

# NVIDIA stack versions
nvidia_driver_version: "590"
nvidia_driver_branch: "server-open"   # open kernel modules (optimized for H200 GSP)
cuda_version: "12-4"                  # apt format (dash-separated)

deploy_dir: /opt/soofi

# vLLM image defaults — override per model if needed
vllm_repository: "vllm/vllm-openai"
vllm_tag: "v0.17.1"

# Models to deploy — each gets its own vllm/vllm-openai container.
# Adding a model = adding one entry here; no other file needs to change.
# repository/tag are optional — fall back to vllm_repository/vllm_tag above.
