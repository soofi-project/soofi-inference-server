# Deployment variables for gpu_nodes
# Secrets (hf_token, litellm_master_key) are in vault.yaml — encrypt before committing:
#   ansible-vault encrypt ansible/inventory/group_vars/gpu_nodes/vault.yaml

# NVIDIA stack versions
nvidia_driver_version: "590"
nvidia_driver_branch: "server-open"   # open kernel modules (optimized for H200 GSP)
cuda_version: "12-4"                  # apt format (dash-separated)

deploy_dir: /opt/soofi

# vLLM defaults — override per model if needed.
vllm_defaults:
  repository: "vllm/vllm-openai"
  tag: "v0.17.1"
  config:
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.92
    max_model_len: 32768
    dtype: "auto"
    enable_prefix_caching: true
    enable_chunked_prefill: true

# Shared parser/tooling presets for model families.
parser_profiles:
  qwen3:
    enable_auto_tool_choice: true
    tool_call_parser: "qwen3_coder"
    reasoning_parser: "qwen3"

  nemotron_v3:
    enable_auto_tool_choice: true
    tool_call_parser: "qwen3_coder"
    reasoning_parser: "nemotron_v3"

  minimax_m2:
    enable_auto_tool_choice: true
    tool_call_parser: "minimax_m2"
    reasoning_parser: "minimax_m2_append_think"

# Models to deploy — each gets its own vllm/vllm-openai container.
# Set enabled: false to keep a model in the catalog without deploying it.
# repository/tag are optional — fall back to vllm_defaults above.
# Use parser_profile for tool/reasoning settings; keep extra_args for one-offs.
models:
# Embedding model for the agents
  - name: "qwen3-embedding-8b"
    enabled: true
    hf_name: "Qwen/Qwen3-Embedding-8B"
    gpu_ids: ["1"]
    vllm:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.2
      max_model_len: 32768
      dtype: "auto"
      enable_prefix_caching: false
      enable_chunked_prefill: false


# ---- LLMs for the agents ------------
  - name: "qwen35-122b-fp8"
    enabled: true
    hf_name: "Qwen/Qwen3.5-122B-A10B-FP8"
    gpu_ids: ["0"]
    parser_profile: "qwen3"
    vllm:
      max_num_seqs: 4
      language_model_only: true
      max_num_batched_tokens: 12288
      kv_cache_dtype: "fp8"
      calculate_kv_scales: true

  - name: "NVIDIA-Nemotron-3-Super-120B-A12B-FP8"
    enabled: false
    hf_name: "unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-FP8"
    gpu_ids: ["0"]
    parser_profile: "nemotron_v3"
    vllm:
      gpu_memory_utilization: 0.9
      swap_space: 0
      max_num_seqs: 512
      trust_remote_code: true
      kv_cache_dtype: "fp8"
      pipeline_parallel_size: 1
      data_parallel_size: 1
      attention_backend: "TRITON_ATTN"
      async_scheduling: true
      mamba_ssm_cache_dtype: "float16"
      max_cudagraph_capture_size: 128
      enable_expert_parallel: true

  - name: "NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    enabled: false
    hf_name: "unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    gpu_ids: ["1"]
    parser_profile: "nemotron_v3"
    vllm:
      gpu_memory_utilization: 0.7
      swap_space: 0
      max_num_seqs: 512
      trust_remote_code: true
      kv_cache_dtype: "fp8"
      pipeline_parallel_size: 1
      data_parallel_size: 1
      attention_backend: "TRITON_ATTN"
      async_scheduling: true
      mamba_ssm_cache_dtype: "float16"
      max_cudagraph_capture_size: 128
        

  # - name: "MiniMax-M2.5"
  #   enabled: false
  #   hf_name: "MiniMaxAI/MiniMax-M2.5"
  #   gpu_ids: ["0", "1"]
  #   parser_profile: "minimax_m2"
  #   vllm:
  #     tensor_parallel_size: 2
  #     max_model_len: 8000
  #     trust_remote_code: true
  #   extra_args:
  #     - "--kv-cache-memory-bytes"
  #     - "5000000000"


  - name: "Nemotron-Cascade-2-30B-A3B-fp8"
    enabled: true
    hf_name: "chankhavu/Nemotron-Cascade-2-30B-A3B-FP8"
    gpu_ids: ["1"]
    parser_profile: "nemotron_v3"
    vllm:
      gpu_memory_utilization: 0.4
      max_model_len: 4000
      enable_chunked_prefill: false
      swap_space: 16
      max_num_seqs: 8
      mamba_ssm_cache_dtype: "float32"
      trust_remote_code: true
    extra_args:
      - "--seed"
      - "3407"


  

# ── STT Service (speaches / faster-whisper) ──────────────────────────────────
stt_service:
  container_name: "faster-whisper"
  image: "ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda-12.6.3"
  internal_port: 8010
  container_port: 8000
  litellm_name: "whisper-1"
  litellm_model: "openai/whisper-1"
  healthcheck_path: "/health"
  gpu_devices: ["1"]
  volumes:
    - "{{ deploy_dir }}/models/hf_cache:/home/ubuntu/.cache/huggingface"
  environment:
    - "PRELOAD_MODELS=[\"Systran/faster-whisper-large-v3\"]"
    - "WHISPER__INFERENCE_DEVICE=cuda"
    - "WHISPER__COMPUTE_TYPE=float16"
    - "STT_MODEL_TTL=-1"

# ── TTS Service (openedai-speech / Piper) ────────────────────────────────────
tts_service:
  container_name: "openedai-speech"
  image: "ghcr.io/matatonic/openedai-speech:0.18.2"
  internal_port: 8011
  container_port: 8000
  litellm_name: "tts-1"
  litellm_model: "openai/tts-1"
  healthcheck_path: "/health"
  volumes:
    - "{{ deploy_dir }}/models/piper:/app/voices"
    - "{{ deploy_dir }}/models/piper/voice_to_speaker.yaml:/app/config/voice_to_speaker.yaml"
  environment:
    - "TTS_HOME=voices"
  voices:
    # Piper ONNX models — HuggingFace base: rhasspy/piper-voices v1.0.0
    # Format: voice name → filename + HF path (de/de_DE/thorsten/high/...)
    - filename: "de_DE-thorsten-high"
      path: "de/de_DE/thorsten/high"
    - filename: "de_DE-thorsten_emotional-medium"
      path: "de/de_DE/thorsten_emotional/medium"
    - filename: "de_DE-kerstin-low"
      path: "de/de_DE/kerstin/low"
    - filename: "en_US-lessac-high"
      path: "en/en_US/lessac/high"

# Image versions
litellm_image: "ghcr.io/berriai/litellm:main-v1.82.3-stable"
webui_image: "ghcr.io/open-webui/open-webui:v0.8.10"

# Ports
litellm_port: 4000
webui_port: 3000

# Open WebUI
webui_auth: "false"
webui_name: "AI Inference Server"

