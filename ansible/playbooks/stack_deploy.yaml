---
# Required variables (from vault):
#   hf_token — HuggingFace API token
#
# Model & service settings come from group_vars/gpu_nodes/vars.yaml.
# To add or change a model/service, edit the vars there — nowhere else.

- name: Inference Stack Deployment
  hosts: gpu_nodes
  become: true
  gather_facts: false

  tasks:
    - name: Select enabled models
      ansible.builtin.set_fact:
        active_models: "{{ models | selectattr('enabled', 'equalto', true) | list }}"

    # ── 1. Directories ────────────────────────────────────────────────────────
    - name: Create deployment directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ deploy_dir }}"
        - "{{ deploy_dir }}/docker"
        - "{{ deploy_dir }}/models/hf_cache"

    # ── 2. Config files ───────────────────────────────────────────────────────
    - name: Deploy docker-compose.yml from template
      ansible.builtin.template:
        src: ../templates/docker-compose.stack.yml.j2
        dest: "{{ deploy_dir }}/docker/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    - name: Create chat templates directory
      ansible.builtin.file:
        path: "{{ deploy_dir }}/models/chat_templates"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Deploy reranker chat template
      ansible.builtin.copy:
        src: ../files/qwen3_reranker.jinja
        dest: "{{ deploy_dir }}/models/chat_templates/qwen3_reranker.jinja"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Deploy litellm-config.yaml from template
      ansible.builtin.template:
        src: ../templates/litellm-config.stack.yaml.j2
        dest: "{{ deploy_dir }}/docker/litellm-config.yaml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      register: litellm_config

    # ── 3. Model pre-download ─────────────────────────────────────────────────
    # Downloads model weights before vLLM starts so the health check is not
    # blocked by a multi-hour initial download. Skipped if cache exists (idempotent).
    # async + poll keeps the SSH connection alive during long downloads.
    - name: Check for incomplete downloads and clean up
      ansible.builtin.find:
        paths: "{{ deploy_dir }}/models/hf_cache/hub"
        patterns: "*.incomplete"
        recurse: true
      register: incomplete_before
      changed_when: false

    - name: Remove incomplete download files before retrying
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ incomplete_before.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: incomplete_before.files | length > 0

    - name: Check if model weights are already cached (no incomplete files)
      ansible.builtin.find:
        paths: "{{ deploy_dir }}/models/hf_cache/hub/models--{{ item.hf_name | replace('/', '--') }}/snapshots"
        file_type: directory
        recurse: false
      register: model_caches
      loop: "{{ active_models }}"
      loop_control:
        label: "{{ item.hf_name }}"
      failed_when: false

    - name: Hint — monitor download progress in a separate terminal
      ansible.builtin.debug:
        msg: "To monitor download progress: ssh {{ ansible_user }}@{{ ansible_host }} 'docker logs -f $(docker ps -lq)'"
      when: model_caches.results | selectattr('matched', 'equalto', 0) | list | length > 0

    - name: Download model weights from HuggingFace
      ansible.builtin.command:
        cmd: >-
          docker run --rm
          --entrypoint huggingface-cli
          -v {{ deploy_dir }}/models/hf_cache:/root/.cache/huggingface
          {% if hf_token | default('') | regex_search('^hf_') %}
          -e HF_TOKEN={{ hf_token }}
          -e HUGGING_FACE_HUB_TOKEN={{ hf_token }}
          {% endif %}
          {{ item.item.repository | default(vllm_defaults.repository) }}:{{ item.item.tag | default(vllm_defaults.tag) }}
          download {{ item.item.hf_name }}
      when: item.matched == 0
      loop: "{{ model_caches.results }}"
      loop_control:
        label: "{{ item.item.hf_name }}"
      async: 7200
      poll: 30
      changed_when: true

    - name: Clean up any residual incomplete download files
      ansible.builtin.find:
        paths: "{{ deploy_dir }}/models/hf_cache/hub"
        patterns: "*.incomplete"
        recurse: true
      register: incomplete_files
      changed_when: false

    - name: Remove residual incomplete files (stale blobs from previous runs)
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ incomplete_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: incomplete_files.files | length > 0

    # ── 4. TTS assets (Piper voice models + XTTS cache) ──────────────────────
    - name: Create TTS model directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop:
        - "{{ deploy_dir }}/models/piper"
        - "{{ deploy_dir }}/models/xtts_cache"
      when: tts_service is defined

    - name: Check if Piper voice model files exist
      ansible.builtin.stat:
        path: "{{ deploy_dir }}/models/piper/{{ item.0.filename }}{{ item.1 }}"
      register: piper_file_stats
      loop: "{{ tts_service.voices | product(['.onnx', '.onnx.json']) | list }}"
      loop_control:
        label: "{{ item.0.filename }}{{ item.1 }}"
      when: tts_service is defined and tts_service.voices is defined

    - name: Download Piper voice models
      ansible.builtin.get_url:
        url: "https://huggingface.co/rhasspy/piper-voices/resolve/v1.0.0/{{ item.item.0.path }}/{{ item.item.0.filename }}{{ item.item.1 }}"
        dest: "{{ deploy_dir }}/models/piper/{{ item.item.0.filename }}{{ item.item.1 }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      loop: "{{ piper_file_stats.results }}"
      loop_control:
        label: "{{ item.item.0.filename }}{{ item.item.1 }}"
      when:
        - tts_service is defined
        - not (item.stat.exists | default(false))

    - name: Deploy openedai-speech voice configuration
      ansible.builtin.template:
        src: ../templates/openedai-speech-voices.yaml.j2
        dest: "{{ deploy_dir }}/models/piper/voice_to_speaker.yaml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      when: tts_service is defined

    # ── 5. HF cache permissions ──────────────────────────────────────────────
    # vLLM runs as root, speaches as uid 1000 (ubuntu). Both need write access
    # to the shared HF cache. Use mode 0777 so both users can read/write.
    - name: Ensure HF cache is writable by all containers
      ansible.builtin.file:
        path: "{{ deploy_dir }}/models/hf_cache"
        mode: "a+rwX"
        recurse: true
      when: model_caches.results | selectattr('matched', 'equalto', 0) | list | length > 0

    # ── 6. Reset Open WebUI when auth setting changes ─────────────────────────
    # Old user/session data in the volume blocks access when auth is toggled.
    # A marker file tracks the last deployed auth state to avoid unnecessary resets.
    - name: Read previous auth state
      ansible.builtin.slurp:
        src: "{{ deploy_dir }}/docker/.webui_auth_state"
      register: prev_auth_state
      failed_when: false

    - name: Reset Open WebUI volume (auth setting changed)
      when: >
        (prev_auth_state.content is defined and
         (prev_auth_state.content | b64decode | trim) != (webui_auth | default('true')))
        or
        (prev_auth_state.content is not defined and
         (webui_auth | default('true')) == 'false')
      block:
        - name: Stop Open WebUI container
          ansible.builtin.command:
            cmd: docker rm -f open-webui
          changed_when: true
          failed_when: false

        - name: Delete Open WebUI data volume
          ansible.builtin.command:
            cmd: docker volume rm open_webui_data
          changed_when: true
          failed_when: false

    - name: Save current auth state
      ansible.builtin.copy:
        content: "{{ webui_auth | default('true') }}"
        dest: "{{ deploy_dir }}/docker/.webui_auth_state"
        mode: "0644"

    # ── 7. Start stack ───────────────────────────────────────────────────────
    - name: Start inference stack
      ansible.builtin.command:
        cmd: docker compose -f {{ deploy_dir }}/docker/docker-compose.yml up -d --remove-orphans
      register: compose_up
      changed_when: >
        'Started' in (compose_up.stderr | default('')) or
        'Created' in (compose_up.stderr | default('')) or
        'Recreated' in (compose_up.stderr | default(''))
      when: active_models | length > 0

    - name: Show compose output
      ansible.builtin.debug:
        var: compose_up.stderr_lines
      when: active_models | length > 0 and (compose_up.changed | default(false))

    - name: Restart LiteLLM (config file changed)
      ansible.builtin.command:
        cmd: docker compose -f {{ deploy_dir }}/docker/docker-compose.yml restart litellm
      when: litellm_config.changed | default(false) and not (compose_up.changed | default(false))
      changed_when: true

    - name: Skip stack start (no models configured)
      ansible.builtin.debug:
        msg: "No enabled models in vars.yaml — skipping stack start."
      when: active_models | length == 0

    # ── 8. Health check ──────────────────────────────────────────────────────
    - name: Wait for LiteLLM to be ready
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port | default(4000) }}/health/liveliness"
        status_code: 200
      register: litellm_health
      until: litellm_health.status == 200
      retries: 40
      delay: 30
      when: active_models | length > 0

    - name: Query deployed models via LiteLLM
      ansible.builtin.uri:
        url: "http://localhost:{{ litellm_port | default(4000) }}/v1/models"
        return_content: true
      register: litellm_models
      when: active_models | length > 0

    # ── 9. Warm up STT (load Whisper into GPU memory) ────────────────────────
    - name: Warm up STT
      ansible.builtin.uri:
        url: "http://localhost:{{ stt_service.internal_port }}/v1/models"
        status_code: 200
      register: whisper_warmup
      until: whisper_warmup.status == 200
      retries: 5
      delay: 10
      when: stt_service is defined
      failed_when: false

    - name: Stack is ready
      ansible.builtin.debug:
        msg:
          - "LiteLLM API: http://{{ ansible_host }}:{{ litellm_port | default(4000) }}/v1"
          - "Open WebUI:  http://{{ ansible_host }}:{{ webui_port | default(3000) }}"
          - "Deployed models: {{ (litellm_models.json.data | map(attribute='id') | list) if litellm_models.json is defined else '(skipped in check mode)' }}"
      when: active_models | length > 0
