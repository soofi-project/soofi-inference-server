---
- name: NVIDIA Stack Setup
  hosts: gpu_nodes
  become: true
  gather_facts: true

  tasks:
    # ── 1. Blacklist Nouveau ──────────────────────────────────────────────────
    # Nouveau must be disabled before the NVIDIA driver can load cleanly.
    - name: Blacklist Nouveau driver
      ansible.builtin.copy:
        dest: /etc/modprobe.d/blacklist-nvidia-nouveau.conf
        content: |
          blacklist nouveau
          options nouveau modeset=0
        owner: root
        group: root
        mode: "0644"
      register: nouveau_blacklist

    - name: Update initramfs after blacklisting Nouveau
      ansible.builtin.command:
        cmd: update-initramfs -u
      when: nouveau_blacklist.changed
      changed_when: true

    # ── 2. CUDA repository ────────────────────────────────────────────────────
    # Must be configured before the driver install — nvidia-driver-590-server
    # is distributed via the CUDA repo, not Ubuntu's standard repo.
    - name: Check if CUDA repository is already configured
      ansible.builtin.stat:
        path: /etc/apt/sources.list.d/cuda-ubuntu2404-x86_64.list
      register: cuda_repo

    - name: Download CUDA keyring package
      ansible.builtin.get_url:
        url: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
        dest: /tmp/cuda-keyring_1.1-1_all.deb
        mode: "0644"
      when: not cuda_repo.stat.exists

    - name: Install CUDA keyring (adds CUDA apt repository)
      ansible.builtin.apt:
        deb: /tmp/cuda-keyring_1.1-1_all.deb
      when: not cuda_repo.stat.exists

    # ── 3. NVIDIA Driver ──────────────────────────────────────────────────────
    # Check first — if any driver is already loaded (nvidia-smi works), skip install.
    # This prevents accidental downgrades on servers with a newer driver.
    - name: Check if NVIDIA driver is already active
      ansible.builtin.command:
        cmd: nvidia-smi
      register: nvidia_smi_precheck
      changed_when: false
      failed_when: false

    - name: Install NVIDIA driver 590-server
      ansible.builtin.apt:
        name: nvidia-driver-590-server
        state: present
        update_cache: true  # always refresh — CUDA repo may have just been added
      register: nvidia_driver
      when: nvidia_smi_precheck.rc != 0

    # Reboot is required for the kernel module to load.
    # Only triggered when the driver was actually installed (changed).
    - name: Reboot after NVIDIA driver install
      ansible.builtin.reboot:
        reboot_timeout: 300
        post_reboot_delay: 15
      when: nvidia_driver.changed | default(false)

    # ── 4. CUDA Toolkit (optional) ───────────────────────────────────────────
    # NOT required for Docker-based Triton/vLLM deployments — CUDA is bundled
    # inside the container. Only needed for native (non-container) CUDA workloads
    # (e.g. nvcc on the host). Set install_cuda_toolkit: true to enable.
    - name: Install CUDA Toolkit 12.4
      ansible.builtin.apt:
        name: cuda-toolkit-12-4
        state: present
        update_cache: true
      when: install_cuda_toolkit | default(false)

    - name: Configure CUDA PATH and LD_LIBRARY_PATH system-wide
      ansible.builtin.copy:
        dest: /etc/profile.d/cuda.sh
        content: |
          export PATH=/usr/local/cuda-12.4/bin:$PATH
          export LD_LIBRARY_PATH=/usr/local/cuda-12.4/lib64:$LD_LIBRARY_PATH
        owner: root
        group: root
        mode: "0644"
      when: install_cuda_toolkit | default(false)

    # ── 5. NVIDIA Container Toolkit ───────────────────────────────────────────
    # Only installs the toolkit. Docker runtime configuration (nvidia-ctk runtime
    # configure) is handled in docker_setup.yaml after Docker is installed.
    - name: Download NVIDIA Container Toolkit GPG key
      ansible.builtin.get_url:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        dest: /tmp/nvidia-ctk-gpgkey.asc
        mode: "0644"
      changed_when: false

    - name: Dearmor NVIDIA Container Toolkit GPG key
      ansible.builtin.shell:
        cmd: gpg --dearmor < /tmp/nvidia-ctk-gpgkey.asc > /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

    - name: Add NVIDIA Container Toolkit apt repository
      ansible.builtin.shell:
        cmd: >
          curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list |
          sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' |
          tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Install NVIDIA Container Toolkit
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true  # always refresh — CTK repo was just added

    # ── 6. GPU Persistence Mode ───────────────────────────────────────────────
    # Reduces GPU initialization latency for inference workloads.
    - name: Enable nvidia-persistenced service
      ansible.builtin.systemd:
        name: nvidia-persistenced
        enabled: true
        state: started

    # ── 7. Verify ─────────────────────────────────────────────────────────────
    - name: Verify NVIDIA driver via nvidia-smi
      ansible.builtin.command:
        cmd: nvidia-smi
      register: nvidia_smi
      changed_when: false
      failed_when: nvidia_smi.rc != 0

    - name: Show nvidia-smi output
      ansible.builtin.debug:
        var: nvidia_smi.stdout_lines
