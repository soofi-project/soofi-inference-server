---
- name: Docker Setup
  hosts: gpu_nodes
  become: true
  gather_facts: true

  tasks:
    # ── 1. Docker Engine ──────────────────────────────────────────────────────
    - name: Check if Docker is already installed
      ansible.builtin.command:
        cmd: docker --version
      register: docker_installed
      changed_when: false
      failed_when: false

    - name: Install Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      when: docker_installed.rc != 0

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
      when: docker_installed.rc != 0

    - name: Install Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true
      when: docker_installed.rc != 0

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ── 2. NVIDIA Container Runtime ───────────────────────────────────────────
    # Requires nvidia-container-toolkit (installed in nvidia_setup.yaml).
    - name: Check if NVIDIA is already the default Docker runtime
      ansible.builtin.command:
        cmd: docker info --format '{{ '{{' }}.DefaultRuntime{{ '}}' }}'
      register: docker_default_runtime
      changed_when: false

    - name: Configure NVIDIA as default Docker runtime
      ansible.builtin.command:
        cmd: nvidia-ctk runtime configure --runtime=docker --set-as-default
      when: docker_default_runtime.stdout != 'nvidia'
      register: nvidia_ctk_configure
      changed_when: true

    - name: Restart Docker after runtime configuration
      ansible.builtin.systemd:
        name: docker
        state: restarted
      when: nvidia_ctk_configure.changed | default(false)

    # ── 3. Docker group membership ────────────────────────────────────────────
    - name: Add mrk to docker group
      ansible.builtin.user:
        name: mrk
        groups: docker
        append: true

    # ── 4. Verify ─────────────────────────────────────────────────────────────
    - name: Verify NVIDIA is default Docker runtime
      ansible.builtin.command:
        cmd: docker info --format '{{ '{{' }}.DefaultRuntime{{ '}}' }}'
      register: docker_runtime_verify
      changed_when: false
      failed_when: docker_runtime_verify.stdout != 'nvidia'

    - name: Show Docker default runtime
      ansible.builtin.debug:
        msg: "Docker default runtime: {{ docker_runtime_verify.stdout }}"
