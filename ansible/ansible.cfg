[defaults]
# Use the local inventory and roles
inventory = ./inventory/hosts.yaml
roles_path = ./roles

# Crucial for lab environments to avoid interactive prompts
host_key_checking = False


[ssh_connection]
# Pipelining reduces the number of SSH operations by running many
# modules without a separate file transfer. Significant speed boost!
pipelining = True

# Control socket path for connection sharing
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

# IdentitiesOnly=yes: SSH only uses agent keys — prevents trying /root/.ssh directly
# (Windows NTFS mounts have 0777 permissions which SSH rejects)
ssh_args = -F /tmp/.ssh/config -o ControlMaster=auto -o ControlPersist=60s -o IdentitiesOnly=yes

# Increase timeout for potentially slow GPU nodes
timeout = 30