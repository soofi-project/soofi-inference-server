services:
  # =============================================================================
  # vLLM — Qwen3.5-122B-FP8 (both GPUs, TP=2)
  # =============================================================================
  vllm-NVIDIA-Nemotron-3-Super-120B-A12B-FP8:
    image: vllm/vllm-openai:v0.17.1
    container_name: vllm-NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]

    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - HF_TOKEN=${HF_TOKEN}
      - LD_LIBRARY_PATH=/lib/x86_64-linux-gnu:/usr/local/cuda/lib64

    volumes:
      - ${HF_CACHE_DIR}:/root/.cache/huggingface

    # Host port 8001 for local debugging; LiteLLM reaches it via Docker network.
    ports:
      - "8001:8000"

    command:
      - "--model"
      - "unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-FP8"
      - "--tensor-parallel-size"
      - "2"
      - "--gpu-memory-utilization"
      - "0.90"
      - "--max-model-len"
      - "32768"
      - "--dtype"
      - "auto"
      - "--enable-prefix-caching"
      - "--served-model-name"
      - "unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-FP8"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "qwen3_coder"
      - "--reasoning-parser"
      - "qwen3"
      - "--swap-space"
      - "16"
      - "--max-num-seqs"
      - "8"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 300s

    shm_size: '16gb'

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864

    networks:
      - inference-net

  # =============================================================================
  # LiteLLM Proxy — OpenAI API Compatibility Layer
  # =============================================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped

    ports:
      - "${LITELLM_PORT}:4000"

    volumes:
      - ./litellm-config.yaml:/app/config.yaml

    env_file:
      - ${ENV_SECRETS_FILE}

    command: ["--config", "/app/config.yaml", "--port", "4000"]

    depends_on:
      vllm-unsloth/NVIDIA-Nemotron-3-Super-120B-A12B-FP8:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - inference-net

  # =============================================================================
  # Open WebUI — Chat Interface
  # =============================================================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    ports:
      - "${WEBUI_PORT}:8080"

    volumes:
      - open-webui-data:/app/backend/data

    env_file:
      - ${ENV_SECRETS_FILE}

    environment:
      - OPENAI_API_BASE_URLS=http://litellm:4000/v1
      - OPENAI_API_KEYS=dummy
      - WEBUI_AUTH=true
      - WEBUI_NAME=AI Inference Server
      - ENABLE_OLLAMA_API=false

    depends_on:
      litellm:
        condition: service_healthy

    networks:
      - inference-net

volumes:
  open-webui-data:
    name: open_webui_data

networks:
  inference-net:
    name: inference-network
    driver: bridge
