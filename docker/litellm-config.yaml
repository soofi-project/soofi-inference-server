# LiteLLM Proxy Configuration
# Routes OpenAI API calls to vLLM containers via the Docker network.
# drop_params: true strips unsupported parameters (e.g. parallel_tool_calls from LangGraph).

model_list:
  - model_name: NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    litellm_params:
      model: openai/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
      api_base: http://vllm-NVIDIA-Nemotron-3-Super-120B-A12B-FP8:8000/v1
      api_key: "dummy"

  - model_name: qwen3-vl-embedding-8b
    litellm_params:
      model: openai/qwen3-vl-embedding-8b
      api_base: http://vllm-qwen3-vl-embedding-8b:8000/v1
      api_key: "dummy"

litellm_settings:
  drop_params: true
  set_verbose: false
