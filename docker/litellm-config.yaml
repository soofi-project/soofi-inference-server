# LiteLLM Proxy Configuration
# Translates OpenAI API calls to Triton Inference Server
#
# WICHTIG: api_base muss den vollständigen Pfad enthalten:
#   http://triton:8000/v2/models/<model_name>/generate

model_list:
  # Mistral 7B AWQ (quantized, ~3.9 GiB VRAM)
  - model_name: mistral-7b-awq
    litellm_params:
      model: triton/mistral-7b-awq
      api_base: http://triton:8000/v2/models/mistral-7b-awq/generate

  # =========================================================================
  # Server-only Models (auf dem H200-Server aktivieren)
  # Nemotron im model_repository aktivieren und Kommentare entfernen:
  # =========================================================================
  # - model_name: nvidia-nemotron-3-nano-30b
  #   litellm_params:
  #     model: triton/nvidia-nemotron-3-nano-30b-a3b-nvfp4
  #     api_base: http://triton:8000/v2/models/nvidia-nemotron-3-nano-30b-a3b-nvfp4/generate

  # Aliases for OpenAI compatibility
  # Lokal: zeigt auf Mistral | Server: auf Nemotron umstellen
  - model_name: gpt-4
    litellm_params:
      model: triton/mistral-7b-awq
      api_base: http://triton:8000/v2/models/mistral-7b-awq/generate

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: triton/mistral-7b-awq
      api_base: http://triton:8000/v2/models/mistral-7b-awq/generate

# General settings
litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
