# LiteLLM Proxy Configuration
# Routes OpenAI API calls to vLLM containers via the Docker network.
# drop_params: true strips unsupported parameters (e.g. parallel_tool_calls from LangGraph).

model_list:
  - model_name: qwen35-122b-fp8
    litellm_params:
      model: openai/qwen35-122b-fp8
      api_base: http://vllm-qwen35-122b-fp8:8000/v1
      api_key: "dummy"

  # ── Embed models (currently on Mac Studio — update api_base when ready) ──
  # - model_name: qwen3-embed-8b
  #   litellm_params:
  #     model: openai/qwen3-embed-8b
  #     api_base: http://mac-studio:7997/v1
  #     api_key: "dummy"

litellm_settings:
  drop_params: true
  set_verbose: false
