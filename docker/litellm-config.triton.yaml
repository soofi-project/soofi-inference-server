# LiteLLM Proxy Configuration — Triton backend
# Routes OpenAI API calls to Triton's OpenAI-compatible frontend (port 9000).

model_list:
  - model_name: qwen3.5-122b
    litellm_params:
      model: openai/qwen3.5-122b
      api_base: http://triton:9000/v1
      api_key: "dummy"
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  - model_name: gpt-4
    litellm_params:
      model: openai/qwen3.5-122b
      api_base: http://triton:9000/v1
      api_key: "dummy"
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

  - model_name: gpt-4o
    litellm_params:
      model: openai/qwen3.5-122b
      api_base: http://triton:9000/v1
      api_key: "dummy"
      extra_body:
        chat_template_kwargs:
          enable_thinking: false

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
