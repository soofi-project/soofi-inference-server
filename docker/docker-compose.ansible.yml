name: soofi-ansible
services:
  ansible:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ansible
    image: soofi-ansible-runner
    tty: true
    stdin_open: true
    entrypoint: /bin/sh -c "while sleep 10000; do :; done"
    environment:
      - ANSIBLE_FORCE_COLOR=true
    network_mode: host
    volumes:
      - ../ansible:/ansible:cached
      - ${HOME}/.ssh:/root/.ssh:ro
