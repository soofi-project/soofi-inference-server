services:
  # =============================================================================
  # Triton Inference Server with vLLM Backend
  # =============================================================================
  triton:
    image: ${TRITON_IMAGE}-dev
    build:
      context: .
      dockerfile: Dockerfile.triton
      args:
        TRITON_IMAGE: ${TRITON_IMAGE}
    container_name: triton-vllm
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0', '1']
              capabilities: [gpu]

    ports:
      - "${HTTP_PORT}:8000"
      - "${GRPC_PORT}:8001"
      - "${METRICS_PORT}:8002"
      - "${OPENAI_PORT}:${OPENAI_PORT}"

    volumes:
      - ${MODEL_REPOSITORY}:/models
      - ${HF_CACHE_DIR}:/root/.cache/huggingface
      - ./triton-start.sh:/triton-start.sh:ro
      - ./qwen3_tool_call_parser.py:/opt/tritonserver/python/openai/openai_frontend/engine/utils/tool_call_parsers/qwen3_tool_call_parser.py:ro
      - ./qwen3_no_think.jinja:/opt/tritonserver/python/qwen3_no_think.jinja:ro

    env_file:
      - .env
      - ${ENV_SECRETS_FILE}

    command: ["bash", "/triton-start.sh"]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 300s

    shm_size: '16gb'

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack:
        soft: 67108864
        hard: 67108864

    networks:
      - inference-net

  # =============================================================================
  # LiteLLM Proxy - OpenAI API Compatibility Layer
  # =============================================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.3-stable
    container_name: litellm-proxy
    restart: unless-stopped

    ports:
      - "${LITELLM_PORT}:4000"

    volumes:
      - ./litellm-config.triton.yaml:/app/config.yaml

    env_file:
      - ${ENV_SECRETS_FILE}

    command: ["--config", "/app/config.yaml", "--port", "4000"]

    depends_on:
      triton:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - inference-net

  # =============================================================================
  # Open WebUI - Chat Interface
  # =============================================================================
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    ports:
      - "${WEBUI_PORT}:8080"

    volumes:
      - open-webui-data:/app/backend/data

    env_file:
      - ${ENV_SECRETS_FILE}

    environment:
      - OPENAI_API_BASE_URLS=http://litellm:4000/v1
      - OPENAI_API_KEYS=${LITELLM_MASTER_KEY}
      - WEBUI_AUTH=true
      - WEBUI_NAME=AI Inference Server
      - ENABLE_OLLAMA_API=false

    depends_on:
      litellm:
        condition: service_healthy

    networks:
      - inference-net

volumes:
  open-webui-data:
    name: open_webui_data

networks:
  inference-net:
    name: inference-network
    driver: bridge
