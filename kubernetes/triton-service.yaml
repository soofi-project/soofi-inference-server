apiVersion: v1
kind: Service
metadata:
  name: triton-inference
  namespace: triton-inference
  labels:
    app: triton-vllm
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: grpc
      port: 8001
      targetPort: 8001
      protocol: TCP
    - name: metrics
      port: 8002
      targetPort: 8002
      protocol: TCP
  selector:
    app: triton-vllm
---
apiVersion: v1
kind: Service
metadata:
  name: triton-external
  namespace: triton-inference
  labels:
    app: triton-vllm
spec:
  type: NodePort
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800
      protocol: TCP
    - name: grpc
      port: 8001
      targetPort: 8001
      nodePort: 30801
      protocol: TCP
    - name: metrics
      port: 8002
      targetPort: 8002
      nodePort: 30802
      protocol: TCP
  selector:
    app: triton-vllm
