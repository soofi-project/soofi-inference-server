apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-vllm
  namespace: triton-inference
  labels:
    app: triton-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-vllm
  template:
    metadata:
      labels:
        app: triton-vllm
    spec:
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.08-vllm-python-py3
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: grpc
            - containerPort: 8002
              name: metrics
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1"
          command:
            - tritonserver
          args:
            - --model-repository=/models
            - --log-verbose=1
            - --log-info=1
            - --log-warning=1
            - --log-error=1
          volumeMounts:
            - name: model-repository
              mountPath: /models
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: shm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: "2"
              memory: "200Gi"
            requests:
              nvidia.com/gpu: "2"
              memory: "100Gi"
              cpu: "8"
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: model-repository
          persistentVolumeClaim:
            claimName: model-repository-pvc
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        nvidia.com/gpu.present: "true"
